<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | FAQ accordion</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  
</head>
<body>
  <!-- The browser widow will consist of two boxes -->
    <div class="box1">
      <img src="./assets/images/background-pattern-desktop.svg" alt="">
    </div>
  
    <div class="box2"></div>

    <div class="overlapped-box">
      <div class="title-box">
        <img src="./assets/images/icon-star.svg" alt="">
        <h1>FAQs</h1>
      </div>  
  
      <div class="container">
        <div class="faq-item">
          <p class="feature">What is Frontend Mentor, and how will it help me?</p>
          <img class="faq-plus-icon" src="./assets/images/icon-plus.svg" alt="plus-icon">
        </div>
        <div class="faq-details"></div>
        
        <div class="faq-item">
          <p class="feature">Is Frontend Mentor free?</p>
          <img class="faq-plus-icon" src="./assets/images/icon-plus.svg" alt="plus-icon">
        </div>
        <div class="faq-details"></div>

        <div class="faq-item">
          <p class="feature">Can I use Frontend Mentor projects in my portfolio?</p>
          <img class="faq-plus-icon" src="./assets/images/icon-plus.svg" alt="plus-icon">
        </div>
        <div class="faq-details"></div>

        <div class="faq-item last-item">
          <p class="feature">How can I get help if I'm stuck on a Frontend Mentor challenge?</p>
          <img class="faq-plus-icon" src="./assets/images/icon-plus.svg" alt="plus-icon">
        </div>
        <div class="faq-details"></div>
      </div>
    </div>
    <script src="./JS/index.js"></script>
</body>
</html>
